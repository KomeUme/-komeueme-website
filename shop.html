  <header class="site-header">
    <a class="brand" href="index.html?v=20260624a">Kome Ume</a>
    <nav class="nav">
      <a href="index.html?v=20260624a" data-i18n="nav_top">TOP</a>
      <div class="nav-item nav-dropdown">
        <a class="nav-trigger" href="hanga-wood.html?v=20260624a" data-i18n="nav_hanga">版画</a>

        </div>
      </div>
      <div class="nav-item nav-dropdown">
        <a class="nav-trigger" href="digital-illustration.html?v=20260624a" data-i18n="nav_digital">デジタル</a>
        <div class="nav-submenu">
          <a href="digital-illustration.html?v=20260624a" data-i18n="nav_digital_illustration">イラスト</a>
          <a href="digital-mini-chara.html?v=20260624a" data-i18n="nav_digital_mini_chara">ミニキャラ</a>
        </div>
      </div>
      <div class="nav-item nav-dropdown">
        <a class="nav-trigger" href="manga-4koma.html?v=20260624a" data-i18n="nav_manga">漫画</a>
        <div class="nav-submenu">
          <a href="manga-4koma.html?v=20260624a" data-i18n="nav_manga_4koma">四コマ</a>

        </div>
      </div>
      <a class="active shop-link" href="shop.html?v=20260624a" data-i18n="nav_shop">販売</a>
      <a href="profile.html?v=20260624a" data-i18n="nav_profile">Profile</a>
      <a class="about-link" href="about.html?v=20260624a" data-i18n="nav_about">About</a>
    </nav>
  </header>

  <main>
    <section class="intro shop-intro">
      <h1 data-i18n="intro_shop">販売</h1>
    </section>

    <section class="shop-page" data-shop-page>
      <div class="shop-view-tabs" role="tablist" aria-label="販売種別">
        <button class="shop-view-tab is-active" type="button" data-shop-tab="works" data-i18n="shop_tab_works" aria-selected="true">作品</button>
        <button class="shop-view-tab" type="button" data-shop-tab="goods" data-i18n="shop_tab_goods" aria-selected="false">関連グッズ</button>
      </div>

      <section class="shop-panel is-active" data-shop-panel="works">
        <div class="shop-toolbar">
          <div class="gallery-sort-control shop-sort-control" data-shop-filter-control>
            <div class="gallery-sort-dropdown">
              <button class="gallery-sort-button" type="button" data-shop-filter-toggle aria-expanded="false" aria-haspopup="menu">
                <span class="gallery-sort-icon" aria-hidden="true"><span></span><span></span><span></span><span></span></span>
                <span class="sr-only" data-i18n="shop_filter_label">販売状態</span>
                <span class="sr-only" data-shop-filter-current>販売中のみ</span>
              </button>
              <div class="gallery-sort-menu" data-shop-filter-menu hidden>
                <button class="gallery-sort-option is-active" aria-pressed="true" type="button" data-shop-filter-option="available" data-i18n="shop_filter_available">販売中のみ</button>
                <button class="gallery-sort-option" aria-pressed="false" type="button" data-shop-filter-option="all" data-i18n="shop_filter_all">すべて表示</button>
              </div>
            </div>
          </div>
        </div>
        <div class="shop-list" data-shop-works></div>
      </section>

      <section class="shop-panel" data-shop-panel="goods" hidden>
        <div class="shop-list" data-shop-goods></div>
      </section>
    </section>
  </main>

  <footer>© Kome Ume</footer>
  <script src="data.js?v=20260624a"></script>
  <script src="app.js?v=20260624a"></script>
  <script src="i18n.js?v=20260624a"></script>
